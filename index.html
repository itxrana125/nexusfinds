<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Elite Curator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1; animation: drift 60s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .container { width: 100%; max-width: 480px; animation: fadeIn 0.8s ease-out; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { 
            font-size: 42px; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(129, 140, 248, 0.3));
        }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; 
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px; transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }

        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; color: #94a3b8; }
        
        input, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 12px; color: white; font-size: 15px; margin-bottom: 20px;
            transition: all 0.3s ease; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); background: rgba(0,0,0,0.4); }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-weight: 700; font-size: 16px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }
        .btn-primary:active { transform: scale(0.95) translateY(2px); }
        .btn-primary:hover { box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6); filter: brightness(1.1); }

        .btn-pinterest { 
            background: #e60023; color: white; margin-top: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #status { text-align: center; font-size: 13px; margin-top: 15px; font-weight: 600; min-height: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NEXUS</h1>
        <p style="color: #64748b; font-weight: 500;">PREMIUM CURATION ENGINE</p>
    </header>

    <div class="card">
        <label>AliExpress Link</label>
        <input type="url" id="productUrl" placeholder="Paste product URL...">
        
        <label>Product Image URL</label>
        <input type="url" id="imageUrl" placeholder="Paste image URL...">
        
        <button class="btn btn-primary" onclick="generateAI()">⚡ Generate Aesthetic Copy</button>
        <div id="status"></div>
    </div>

    <div class="card" id="outputSection" style="display:none; animation: fadeIn 0.5s ease-out;">
        <label>AI Masterpiece</label>
        <textarea id="aiOutput" rows="6"></textarea>
        <button class="btn btn-pinterest" onclick="postToPinterest()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.08 3.14 9.43 7.62 11.17-.1-.95-.19-2.4.04-3.43.21-.93 1.34-5.67 1.34-5.67s-.34-.68-.34-1.68c0-1.58.92-2.76 2.05-2.76 1 0 1.43.75 1.43 1.64 0 1-.63 2.5-.96 3.88-.27 1.15.58 2.1 1.7 2.1 2.05 0 3.63-2.16 3.63-5.28 0-2.76-1.98-4.69-4.82-4.69-3.28 0-5.21 2.46-5.21 5.01 0 1 .38 2.06.86 2.64.1.12.11.22.08.33-.09.37-.28 1.15-.32 1.29-.05.21-.18.25-.41.14-1.52-.7-2.47-2.92-2.47-4.7 0-3.83 2.78-7.34 8.01-7.34 4.21 0 7.48 2.99 7.48 7 0 4.18-2.63 7.54-6.29 7.54-1.23 0-2.39-.64-2.78-1.4l-.76 2.88c-.27 1.05-1.02 2.36-1.52 3.17C10.63 23.82 11.31 24 12 24c6.63 0 12-5.37 12-12S18.63 0 12 0z"/></svg>
            Post to Pinterest
        </button>
    </div>
</div>

<script>
    // FIXED CONFIG
    const GEMINI_KEY = "AIzaSyCQbqG6MoFf4XTVv_sckAwDgoaxd8-qRCQ";
    const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
    
    const $ = id => document.getElementById(id);

    async function generateAI() {
        const productUrl = $('productUrl').value;
        if(!productUrl) return alert("Bhai, Product Link daalein!");

        $('status').innerText = "SYNTHESIZING...";
        $('status').style.color = "#818cf8";
        
        const promptText = `Act as a luxury lifestyle curator. Create a Pinterest title and description for this product link: ${productUrl}. 
        Format exactly as:
        TITLE: [Short Catchy Title]
        DESCRIPTION: [Elegant 2-sentence description]
        HASHTAGS: #aesthetic #homedecor #lifestyle #finds`;

        try {
            const response = await fetch(MODEL_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            if (!response.ok) throw new Error('API Response Error');

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            $('aiOutput').value = aiText;
            $('outputSection').style.display = 'block';
            $('status').innerText = "READY FOR TRANSMISSION";
            $('status').style.color = "#10b981";
        } catch (e) {
            console.error(e);
            $('status').innerText = "AI ERROR - Check Console";
            $('status').style.color = "#ef4444";
        }
    }

    function postToPinterest() {
        const raw = $('aiOutput').value;
        const titleMatch = raw.match(/TITLE:\s*(.*)/i);
        const descMatch = raw.match(/DESCRIPTION:\s*([\s\S]*?)(?=HASHTAGS|$)/i);
        const hashMatch = raw.match(/HASHTAGS:\s*(.*)/i);
        
        const title = titleMatch ? titleMatch[1].trim() : "Luxury Find";
        const description = (descMatch ? descMatch[1].trim() : "") + " " + (hashMatch ? hashMatch[1].trim() : "");
        const image = $('imageUrl').value;
        const link = $('productUrl').value;

        if(!image) return alert("Pehle Product Image ka link dalain!");

        const pinUrl = `https://www.pinterest.com/pin-builder/?url=${encodeURIComponent(link)}&media=${encodeURIComponent(image)}&description=${encodeURIComponent(description)}&title=${encodeURIComponent(title)}`;
        window.open(pinUrl, '_blank');
    }
</script>

</body>
</html>
