<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | iOS Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.7);
            --ios-accent: #007aff; /* Apple Blue */
            --ios-text: #ffffff;
            --ios-text-dim: #8e8e93;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'SF Pro Display', 'Plus Jakarta Sans', sans-serif; 
            background: var(--ios-bg); 
            background-image: radial-gradient(circle at 0% 0%, #1c1c1e 0%, #000000 100%);
            color: var(--ios-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .ios-container {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* iOS Header */
        .ios-header {
            text-align: left;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .ios-header h1 { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; }
        .ios-header p { color: var(--ios-text-dim); font-size: 17px; }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .ios-widget {
            background: var(--ios-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 22px;
            padding: 24px;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }
        .ios-widget:active { transform: scale(0.97); }

        /* Control Panel */
        .ios-panel {
            background: var(--ios-card);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
        }

        .ios-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="file"] {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 16px;
            border-radius: 14px;
            color: white;
            flex: 1;
            min-width: 250px;
            font-size: 16px;
        }

        .ios-btn {
            background: var(--ios-accent);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ios-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .ios-btn:active { transform: scale(0.95); }

        .ios-btn-secondary { background: rgba(255,255,255,0.1); }

        /* Grid */
        .ios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .ios-card {
            background: var(--ios-card);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .ios-card-img { width: 100%; height: 220px; object-fit: cover; }
        
        .ios-card-content { padding: 20px; }

        .ios-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--ios-accent);
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            padding: 15px;
            margin-top: 15px;
            resize: none;
            font-size: 14px;
            height: 110px;
        }

        .btn-confirm { background: #ff3b30; margin-top: 15px; width: 100%; }

    </style>
</head>
<body>

<div class="ios-container">
    <header class="ios-header">
        <h1>Dashboard</h1>
        <p>Tuesday, 5 May</p>
    </header>

    <div class="stats-row">
        <div class="ios-widget">
            <span style="color:var(--ios-text-dim); font-size:13px; font-weight:600;">QUEUE</span>
            <h2 id="st-total" style="font-size:32px; margin-top:5px;">0</h2>
        </div>
        <div class="ios-widget">
            <span style="color:var(--ios-accent); font-size:13px; font-weight:600;">PUBLISHED</span>
            <h2 id="st-success" style="font-size:32px; margin-top:5px;">0</h2>
        </div>
    </div>

    <div class="ios-panel">
        <div class="ios-input-group">
            <input type="text" id="urlIn" placeholder="Product URL">
            <input type="file" id="imgIn">
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="ios-btn ios-btn-secondary" onclick="addToIos()">Add Product</button>
            <button class="ios-btn" onclick="runIosAI()">⚡ Start Automation</button>
        </div>
    </div>

    <div class="ios-grid" id="iosGrid">
        <!-- iOS Cards -->
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCQbqG6MoFf4XTVv_sckAwDgoaxd8-qRCQ";
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    let db = [];
    let success = 0;

    function addToIos() {
        const url = document.getElementById('urlIn').value;
        const file = document.getElementById('imgIn').files[0];
        if(!url || !file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            db.push({ id: Date.now(), url, img: e.target.result, ai: "", status: 'pending' });
            renderIos();
            updateIosStats();
        };
        reader.readAsDataURL(file);
    }

    function renderIos() {
        const grid = document.getElementById('iosGrid');
        grid.innerHTML = db.map(p => `
            <div class="ios-card">
                <span class="ios-badge">${p.status.toUpperCase()}</span>
                <img src="${p.img}" class="ios-card-img">
                <div class="ios-card-content">
                    <textarea id="ai-${p.id}">${p.ai}</textarea>
                    <button class="ios-btn btn-confirm" onclick="confirmIos(${p.id})">Confirm & Copy</button>
                </div>
            </div>
        `).join('');
    }

    async function runIosAI() {
        for(let p of db.filter(x => x.status === 'pending')) {
            const res = await fetch(ENDPOINT, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "Write an aesthetic Pinterest title/description for: " + p.url }] }] })
            });
            const data = await res.json();
            p.ai = data.candidates[0].content.parts[0].text;
            p.status = 'ready';
            renderIos();
        }
    }

    function confirmIos(id) {
        const p = db.find(x => x.id === id);
        navigator.clipboard.writeText(p.ai);
        if(p.status !== 'done') {
            p.status = 'done';
            success++;
            updateIosStats();
            renderIos();
            window.open(`https://www.pinterest.com/pin-builder/?url=${encodeURIComponent(p.url)}`, '_blank');
        }
    }

    function updateIosStats() {
        document.getElementById('st-total').innerText = db.length;
        document.getElementById('st-success').innerText = success;
    }
</script>
</body>
</html>
