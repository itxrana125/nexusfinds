<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | AI Automation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #a855f7; --bg: #0b0f1a;
            --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9; --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px; background: rgba(0,0,0,0.4);
            border-right: 1px solid var(--border);
            padding: 30px; display: flex; flex-direction: column;
            position: fixed; height: 100vh;
        }

        .logo { font-size: 28px; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }

        .stat-mini { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .stat-mini span { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-mini b { font-size: 20px; color: var(--primary); }

        /* Main Content */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; }

        .top-stats { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid var(--border); height: 300px; }

        .control-panel { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 15px; }
        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; outline: none; width: 100%; }

        .btn { padding: 14px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; width: 100%; }
        .btn-add { background: var(--primary); color: white; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .card-body { padding: 20px; }
        .card-status { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 5px 10px; border-radius: 20px; font-weight: 800; }
        
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #cbd5e1; padding: 10px; margin-top: 10px; resize: none; font-size: 13px; }

        .btn-post { background: #e60023; color: white; width: 100%; margin-top: 10px; font-size: 12px; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">NEXUS AI</div>
        <div class="stat-mini">
            <span>Total Posts</span>
            <b id="count-total">0</b>
        </div>
        <div class="stat-mini">
            <span>Successful Pins</span>
            <b id="count-success" style="color: var(--success);">0</b>
        </div>
        <div style="margin-top: auto;">
            <p style="font-size: 10px; color: #4b5563;">V3.0 ENTERPRISE EDITION</p>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-stats">
            <div class="control-panel">
                <h3 style="margin-bottom: 20px;">Queue New Products</h3>
                <div class="input-row">
                    <input type="text" id="pUrl" placeholder="AliExpress Link">
                    <input type="file" id="pImage" accept="image/*">
                    <button class="btn btn-add" onclick="addToQueue()">Add</button>
                </div>
                <button class="btn btn-primary" onclick="processAll()">⚡ Run AI Automation Batch</button>
            </div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="grid" id="productGrid">
            <!-- Cards will inject here -->
        </div>
    </main>

<script>
    const API_KEY = "AIzaSyCQbqG6MoFf4XTVv_sckAwDgoaxd8-qRCQ";
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    let store = {
        queue: [],
        postedCount: 0
    };

    // Initialize Chart
    const ctx = document.getElementById('myChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Success', 'Pending', 'Failed'],
            datasets: [{
                data: [0, 0, 0],
                backgroundColor: ['#10b981', '#6366f1', '#ef4444'],
                borderWidth: 0
            }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
    });

    function updateStats() {
        document.getElementById('count-total').innerText = store.queue.length;
        document.getElementById('count-success').innerText = store.postedCount;
        
        myChart.data.datasets[0].data = [
            store.postedCount, 
            store.queue.filter(p => !p.aiText).length,
            0
        ];
        myChart.update();
    }

    function addToQueue() {
        const url = document.getElementById('pUrl').value;
        const file = document.getElementById('pImage').files[0];
        if(!url || !file) return alert("Details poori bharein!");

        const reader = new FileReader();
        reader.onload = (e) => {
            store.queue.push({ id: Date.now(), url, img: e.target.result, aiText: "", status: 'pending' });
            render();
            updateStats();
        };
        reader.readAsDataURL(file);
    }

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = store.queue.map(p => `
            <div class="card">
                <div class="card-status" style="background:${p.status==='done'?'#10b981':'#6366f1'}">${p.status.toUpperCase()}</div>
                <img src="${p.img}" class="card-img">
                <div class="card-body">
                    <textarea id="area-${p.id}">${p.aiText}</textarea>
                    <button class="btn btn-post" onclick="markAsPosted(${p.id})">Confirm Pinterest Post</button>
                </div>
            </div>
        `).join('');
    }

    async function processAll() {
        const pending = store.queue.filter(p => p.status === 'pending');
        for(let item of pending) {
            try {
                const res = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Write a viral Pinterest title and description for this AliExpress product: " + item.url }] }] })
                });
                const data = await res.json();
                item.aiText = data.candidates[0].content.parts[0].text;
                item.status = 'ready';
                render();
                updateStats();
            } catch (e) { console.error(e); }
        }
    }

    function markAsPosted(id) {
        const item = store.queue.find(p => p.id === id);
        if(item.status !== 'done') {
            item.status = 'done';
            store.postedCount++;
            
            // Open Pinterest Builder as well
            const pinUrl = `https://www.pinterest.com/pin-builder/?url=${encodeURIComponent(item.url)}&description=${encodeURIComponent(item.aiText)}`;
            window.open(pinUrl, '_blank');
            
            render();
            updateStats();
        }
    }
</script>
</body>
</html>
