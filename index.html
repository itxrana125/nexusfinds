<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Premium Curation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #a855f7; --bg: #0f172a; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-gen { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-pin { background: #e60023; color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h1>NEXUS</h1>
    <input type="url" id="productUrl" placeholder="AliExpress Product Link">
    <input type="url" id="imageUrl" placeholder="Product Image URL">
    <button class="btn btn-gen" onclick="generateAI()">⚡ Generate Aesthetic Copy</button>
    <div id="status"></div>
    
    <div id="outputArea" style="display:none;">
        <textarea id="aiText" rows="6"></textarea>
        <button class="btn btn-pin" id="pinBtn" onclick="postToPinterest()">Post to Pinterest</button>
    </div>
</div>

<script>
    async function generateAI() {
        const prodUrl = document.getElementById('productUrl').value;
        const status = document.getElementById('status');
        
        if(!prodUrl) return alert("Link dalain!");

        status.innerText = "GENERATING...";
        status.style.color = "#818cf8";

        // CLEAN API CONFIG
        const KEY = "AIzaSyCQbqG6MoFf4XTVv_sckAwDgoaxd8-qRCQ";
        const ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + KEY;

        const payload = {
            contents: [{
                parts: [{ text: "Write a high-end Pinterest title and description for this product: " + prodUrl }]
            }]
        };

        try {
            const response = await fetch(ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                const result = data.candidates[0].content.parts[0].text;
                document.getElementById('aiText').value = result;
                document.getElementById('outputArea').style.display = 'block';
                document.getElementById('pinBtn').style.display = 'block';
                status.innerText = "SUCCESS!";
                status.style.color = "#10b981";
            } else {
                console.error("API Error:", data);
                status.innerText = "API Error: " + (data.error ? data.error.message : "404 Not Found");
                status.style.color = "#ef4444";
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            status.innerText = "Network Error - Check Console";
            status.style.color = "#ef4444";
        }
    }

    function postToPinterest() {
        const link = document.getElementById('productUrl').value;
        const img = document.getElementById('imageUrl').value;
        const desc = document.getElementById('aiText').value;
        
        if(!img) return alert("Image URL zaroori hai!");

        const pinUrl = `https://www.pinterest.com/pin-builder/?url=${encodeURIComponent(link)}&media=${encodeURIComponent(img)}&description=${encodeURIComponent(desc)}`;
        window.open(pinUrl, '_blank');
    }
</script>

</body>
</html>
